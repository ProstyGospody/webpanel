name: proxy-panel-dev

services:
  api:
    image: golang:1.24-alpine
    restart: unless-stopped
    working_dir: /workspace
    command: ["sh", "/workspace/scripts/docker-api-entrypoint.sh"]
    env_file:
      - .env.docker
    volumes:
      - ./:/workspace
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    ports:
      - "18080:18080"

  web:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /workspace/web
    command: ["sh", "/workspace/scripts/docker-web-entrypoint.sh"]
    env_file:
      - .env.docker
    environment:
      WATCHPACK_POLLING: "true"
    volumes:
      - ./:/workspace
      - web-node-modules:/workspace/web/node_modules
    depends_on:
      api:
        condition: service_started
    ports:
      - "13000:13000"

volumes:
  go-mod-cache:
  go-build-cache:
  web-node-modules:
