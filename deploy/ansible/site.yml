---
- name: Proxy Panel host deploy (Ubuntu 24.04, systemd)
  hosts: local
  gather_facts: true
  become: true

  vars:
    repo_root: "{{ playbook_dir }}/../.."
    install_script: "{{ repo_root }}/deploy/install.sh"

  tasks:
    - name: Ensure host is Ubuntu 24.04
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_version is version("24.04", "==")
        fail_msg: "This Ansible deploy target must be Ubuntu 24.04"

    - name: Ensure installer script exists
      ansible.builtin.stat:
        path: "{{ install_script }}"
      register: installer_stat

    - name: Abort when installer script is missing
      ansible.builtin.fail:
        msg: "Installer script not found at {{ install_script }}"
      when: not installer_stat.stat.exists

    - name: Run host installer in non-interactive mode
      ansible.builtin.command:
        cmd: "bash {{ install_script }} --reconfigure --non-interactive"
      environment:
        PROXY_PANEL_NONINTERACTIVE: "1"
        PANEL_PUBLIC_HOST: "{{ panel_public_host }}"
        PANEL_PUBLIC_PORT: "{{ panel_public_port | string }}"
        PANEL_ACME_EMAIL: "{{ panel_acme_email }}"
        HY2_DOMAIN: "{{ hy2_domain }}"
        HY2_PORT: "{{ hy2_port | string }}"
        HY2_STATS_PORT: "{{ hy2_stats_port | string }}"
        MTPROXY_PUBLIC_HOST: "{{ mtproxy_public_host }}"
        MTPROXY_PORT: "{{ mtproxy_port | string }}"
        MTPROXY_STATS_PORT: "{{ mtproxy_stats_port | string }}"
        MTPROXY_TLS_DOMAIN: "{{ mtproxy_tls_domain }}"
        INITIAL_ADMIN_EMAIL: "{{ initial_admin_email }}"
        INITIAL_ADMIN_PASSWORD: "{{ initial_admin_password | default('') }}"
        PROMETHEUS_ENABLED: "{{ (prometheus_enabled | default(true)) | ternary('true', 'false') }}"
      register: install_result
      changed_when: true

    - name: Show installer output
      ansible.builtin.debug:
        var: install_result.stdout_lines

